    <script>
      // SPA fallback decoder: pairs with public/404.html so GitHub Pages can
      // serve deep links like /tatva-tribe-website/about. Restores the real
      // path before React Router boots.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
