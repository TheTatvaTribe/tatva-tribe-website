<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Tatva Tribe</title>
    <script>
      // SPA fallback for GitHub Pages.
      // Encodes the requested path into a query string, then redirects to the
      // app shell at the project base. The decoder in index.html restores the
      // real URL via history.replaceState before React Router boots.
      // Adapted from https://github.com/rafgraph/spa-github-pages (MIT).
      (function () {
        var pathSegmentsToKeep = 1; // matches Vite `base: '/tatva-tribe-website/'`
        var l = window.location;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
